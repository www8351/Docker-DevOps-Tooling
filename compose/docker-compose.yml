# Declarative replacement for the old `docker run` menu scripts.
# Paths are relative to this file; run via `docker compose` or the Taskfile.
#
# Usage:
#   docker compose --env-file .env up -d
#   docker compose config        # validate without starting anything
#
# Hardening baseline (applied per service below):
#   - pinned image tags (overridable via .env; alpine variants provide busybox
#     wget for healthchecks)
#   - healthchecks on every long-running service that can support one
#   - two network tiers: `web` (public-facing) and `mgmt` (docker.sock consumers)
#   - read-only root filesystems with tmpfs for known write paths
#   - all capabilities dropped, only the minimum added back
#   - no-new-privileges, CPU/memory limits, bounded json-file logging

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Static web server, serving ../web read-only (was Create_Web_Server.sh / nginx_exec.sh).
  nginx:
    image: nginx:${NGINX_TAG:-1.27-alpine}
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
      # stub_status on :8082 (not host-mapped) for the observability profile.
      - ./nginx/status.conf:/etc/nginx/conf.d/status.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    networks: [web]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # Apache, replacing the old (nonexistent) "apache2" image with the real httpd.
  httpd:
    image: httpd:${HTTPD_TAG:-2.4-alpine}
    ports:
      - "${HTTPD_PORT:-8081}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /usr/local/apache2/logs # httpd.pid lives here
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    networks: [web]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # Docker management UI, replacing the dead abh1nav/dockerui.
  # No healthcheck: portainer-ce is scratch-based (no shell, wget, or curl),
  # so there is no exec probe to run; `restart: unless-stopped` covers crashes.
  # The socket stays read-write on purpose — Portainer manages the engine.
  portainer:
    image: portainer/portainer-ce:${PORTAINER_TAG:-2.27.9}
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # Custom image built from ../images/counter (was lab2 Dockerfile + counter.sh).
  # `init: true` so the sleep loop gets a proper PID 1 and honors SIGTERM.
  counter:
    build:
      context: ../images/counter
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f counter.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [web]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

  # The dockerctl CLI image. It is a one-shot tool, not a daemon, so it lives
  # behind the "tools" profile: `docker compose --profile tools build dockerctl`
  # builds it without it ever starting on `docker compose up`.
  # No healthcheck: it runs a command and exits.
  dockerctl:
    profiles: ["tools"]
    build:
      context: ../cli
    image: dockerctl:local
    # Mount the host socket to drive the real engine; safe to omit for --help.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ------------------------------------------------------------------
  # Observability profile — `docker compose --profile observability up`
  # Same hardening baseline as the core stack: pinned tags, read-only
  # rootfs, cap_drop ALL, no-new-privileges, memory limits, bounded logs.
  # Explicitly out of scope: Alertmanager, Loki.
  # ------------------------------------------------------------------

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:${PROMETHEUS_TAG:-v3.13.0}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:${GRAFANA_TAG:-12.3.8}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks: [mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # Container-level metrics. Needs read-only views of the host and the
  # docker state directory — that is its job; everything stays :ro.
  cadvisor:
    profiles: ["observability"]
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_TAG:-v0.55.1}
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    security_opt:
      - no-new-privileges:true
    networks: [mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 192M

  # No healthcheck: distroless-style image, no shell to probe; prometheus's
  # `up` metric for the nginx job covers liveness.
  nginx-exporter:
    profiles: ["observability"]
    image: nginx/nginx-prometheus-exporter:${NGINX_EXPORTER_TAG:-1.5.1}
    command: ["--nginx.scrape-uri=http://nginx:8082/stub_status"]
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    # web to reach nginx's stub_status, mgmt so prometheus can scrape it.
    networks: [web, mgmt]
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M

networks:
  # Public-facing services; no access to the docker socket tier.
  web:
  # Socket consumers (portainer, dockerctl), isolated from the web tier.
  mgmt:

volumes:
  portainer_data:
  prometheus_data:
  grafana_data:
