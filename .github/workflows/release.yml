name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: counter
            context: images/counter
          - name: dockerctl
            context: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert tag matches cli/pyproject.toml version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! grep -q "^version = \"${version}\"" cli/pyproject.toml; then
            echo "Tag ${GITHUB_REF_NAME} does not match cli/pyproject.toml version" >&2
            exit 1
          fi

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/www8351/docker-devops-tooling/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Push ${{ matrix.name }} to GHCR (multi-arch, attested)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign ${{ matrix.name }} (keyless, OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/www8351/docker-devops-tooling/${{ matrix.name }}@${DIGEST}"

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          body: |
            Container images:
            `ghcr.io/www8351/docker-devops-tooling/counter` and
            `ghcr.io/www8351/docker-devops-tooling/dockerctl`
            (tags: this version, major.minor, latest).

            See [CHANGELOG.md](https://github.com/www8351/Docker-DevOps-Tooling/blob/main/CHANGELOG.md)
            for the curated list of changes.
