name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege by default; jobs that need more escalate explicitly.
permissions:
  contents: read

# One run per ref; superseded pushes are cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate compose file
        run: docker compose -f compose/docker-compose.yml config --quiet

      - name: Lint counter Dockerfile (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/counter/Dockerfile

      - name: Lint dockerctl Dockerfile (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: cli/Dockerfile

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          additional_files: counter.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Lint Python (ruff)
        run: |
          pip install ruff
          ruff check cli
          ruff format --check cli

      - name: Import-check the CLI
        run: |
          pip install -e 'cli[dev]'
          dockerctl version

      - name: Type-check (mypy)
        run: mypy --config-file cli/pyproject.toml cli/dockerctl cli/tests

      - name: Run tests (pytest, coverage-gated)
        run: pytest cli

  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: counter
            context: images/counter
          - name: dockerctl
            context: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Scan ${{ matrix.name }} image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.name }}:ci
          severity: HIGH,CRITICAL
          # Images are hardened, so gate the build on findings. Unpatchable
          # base-image CVEs (no fix upstream yet) are ignored so CI stays green.
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate SBOM for ${{ matrix.name }} (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ matrix.name }}:ci
          format: cyclonedx
          output: ${{ matrix.name }}-sbom.cdx.json
          # SBOM generation documents the image; it must never gate the build.
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.name }}
          path: ${{ matrix.name }}-sbom.cdx.json
          retention-days: 30

  # Boot the actual hardened stack: --wait turns every compose healthcheck
  # into a CI assertion, and the curl probes prove the read-only/cap-dropped
  # services really serve traffic.
  stack-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Boot the hardened stack (healthchecks gate)
        run: |
          cp compose/.env.example compose/.env
          docker compose -f compose/docker-compose.yml up -d --wait --wait-timeout 120

      - name: Probe web endpoints
        run: |
          curl -fsS -o /dev/null -w 'nginx :8080 -> %{http_code}\n' http://localhost:8080
          curl -fsS -o /dev/null -w 'httpd :8081 -> %{http_code}\n' http://localhost:8081

      - name: Show stack state
        run: docker compose -f compose/docker-compose.yml ps

      # One live integration test against a real engine, complementing the
      # fully-mocked unit suite: the dockerctl image drives the runner's socket.
      # The image runs as non-root (UID 10001), so grant it the socket's group
      # instead of root — hardening stays intact.
      - name: Live dockerctl smoke test
        run: |
          docker compose -f compose/docker-compose.yml --profile tools build dockerctl
          docker run --rm \
            --group-add "$(stat -c '%g' /var/run/docker.sock)" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            dockerctl:local containers ls

      - name: Tear down
        if: always()
        run: docker compose -f compose/docker-compose.yml down -v

  publish:
    needs: [lint, image, stack-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing (OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: counter
            context: images/counter
          - name: dockerctl
            context: cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/www8351/docker-devops-tooling/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Push ${{ matrix.name }} to GHCR (multi-arch, attested)
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign ${{ matrix.name }} (keyless, OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/www8351/docker-devops-tooling/${{ matrix.name }}@${DIGEST}"
