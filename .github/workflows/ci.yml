name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f compose/docker-compose.yml config --quiet

      - name: Lint counter Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/counter/Dockerfile

      - name: Lint dockerctl Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: cli/Dockerfile

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: counter.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cli/pyproject.toml

      - name: Lint Python (ruff)
        run: |
          pip install ruff
          ruff check cli
          ruff format --check cli

      - name: Import-check the CLI
        run: |
          pip install -e 'cli[test]'
          dockerctl version

      - name: Run tests (pytest)
        run: pytest cli

  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: counter
            context: images/counter
          - name: dockerctl
            context: cli
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: docker build -t ${{ matrix.name }}:ci ${{ matrix.context }}

      - name: Scan ${{ matrix.name }} image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.name }}:ci
          severity: HIGH,CRITICAL
          # Images are hardened, so gate the build on findings. Unpatchable
          # base-image CVEs (no fix upstream yet) are ignored so CI stays green.
          ignore-unfixed: true
          exit-code: "1"
